# render.yaml — Render Blueprint (single web service)
# Express serves both the API (/api/*) and the built React frontend.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: media-bill
    runtime: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false        # Set in Render dashboard → Environment
      - key: JWT_SECRET
        sync: false        # Set in Render dashboard → Environment
      - key: CLIENT_ORIGIN
        value: same-origin # Not needed when frontend+backend are same service
