# render.yaml — Render Blueprint
# Deploys both the backend (Web Service) and frontend (Static Site) from one repo.
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend: Node/Express API ────────────────────────────────────
  - type: web
    name: media-bill-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false          # Set manually in Render dashboard (secret)
      - key: JWT_SECRET
        sync: false          # Set manually in Render dashboard (secret)
      - key: CLIENT_ORIGIN
        sync: false          # Set to your frontend Render URL after deploy

  # ── Frontend: Vite/React Static Site ────────────────────────────
  - type: static
    name: media-bill-ui
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # Set to https://media-bill-api.onrender.com/api
    routes:
      # SPA fallback — all paths serve index.html (React Router handles routing)
      - type: rewrite
        source: /*
        destination: /index.html
